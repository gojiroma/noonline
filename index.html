<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>テキストボックス</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            position: relative;
        }

        textarea {
            width: 80%;
            max-width: 600px;
            min-height: 200px;
            padding: 12px;
            font-size: 16pt;
            border: none;
            outline: none;
            resize: none;
            box-sizing: border-box;
            font-family: inherit;
            line-height: 1.5;
            background-color: #ffffff;
        }

        textarea::-webkit-resizer {
            display: none;
        }

        #datetime {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: rgba(0, 0, 255, 0.5);
            font-size: 18px;
            text-align: right;
            line-height: 1.4;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* リンク集のスタイル */
        .link-menu {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 8px;
            padding: 8px 0;
            opacity: 0.6;
            transition: opacity 0.2s, visibility 0.2s;
            z-index: 1000;
            min-width: 200px;
        }

        .link-menu:hover {
            opacity: 1;
            visibility: visible;
        }

        .link-menu a {
            display: block;
            padding: 8px 16px;
            text-decoration: none;
            transition: background-color 0.2s;
        }

        .link-menu a:hover {
            background-color: rgba(0, 0, 0, 0.05);
        }

        /* 各リンクの色 */
        .link-amazon {
            color: #b87e26;
        }

        .link-calendar {
            color: #9e9142;
        }

        .link-mail {
            color: #0000FF;
        }

        .link-inoreader {
            color: #007b7b;
        }

        .link-lechat {
            color: #FF0000;
        }

        .link-maps {
            color: #008000;
        }

        .link-keep {
            color: #7e8e08;
        }

        .link-transit {
            color: #8B4513;
        }
        .link-github {
            color: #333;
        }
    </style>
</head>

<body>
    <textarea id="textContent" autofocus></textarea>
    <div id="datetime"></div>

    <!-- リンク集 -->
    <div class="link-menu">
        <a href="https://www.amazon.co.jp/" class="link-amazon" target="_blank">Amazon</a>
        <a href="https://calendar.google.com/calendar/u/0/r" class="link-calendar" target="_blank">Calendar</a>
        <a href="https://mail.zoho.jp/zm/#mail/folder/inbox" class="link-mail" target="_blank">Mail</a>
        <a href="https://www.inoreader.com/all_articles" class="link-inoreader" target="_blank">Inoreader</a>
        <a href="https://chat.mistral.ai/chat" class="link-lechat" target="_blank">Le Chat</a>
        <a href="https://www.google.com/maps" class="link-maps" target="_blank">Maps</a>
        <a href="https://keep.google.com/" class="link-keep" target="_blank">Keep</a>
        <a href="https://transit.yahoo.co.jp/" class="link-transit" target="_blank">乗り換え</a>
        <a href="https://github.com/gojiroma/noonline/edit/main/index.html" class="link-github" target="_blank">Edit</a>
    </div>

    <script>
        const textarea = document.getElementById('textContent');
        const datetimeElement = document.getElementById('datetime');

        // ローカルストレージから読み込み
        textarea.value = localStorage.getItem('textContent') || '';

        // テキストエリアの高さを自動調整
        textarea.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            localStorage.setItem('textContent', this.value);
        });
        textarea.style.height = 'auto';
        textarea.style.height = (textarea.scrollHeight) + 'px';

        // 日付と時刻を更新
        function updateDatetime() {
            const now = new Date();
            const optionsDate = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            const optionsTime = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            const date = now.toLocaleDateString('ja-JP', optionsDate);
            const time = now.toLocaleTimeString('ja-JP', optionsTime);
            datetimeElement.innerHTML = `${date}<br>${time}`;
        }

        // 初回表示
        updateDatetime();
        // 1秒ごとに更新
        setInterval(updateDatetime, 1000);

        // Shiftキーを2回押したかを追跡
        let shiftPressCount = 0;
        let shiftPressTimer = null;

        // Commandキーを2回押したかを追跡
        let commandPressCount = 0;
        let commandPressTimer = null;

        // キーイベントを監視
        document.addEventListener('keydown', function (event) {
            // Escキーが押された場合
            if (event.key === 'Escape') {
                const cursorPosition = textarea.selectionStart;
                const textBeforeCursor = textarea.value.substring(0, cursorPosition);
                const textAfterCursor = textarea.value.substring(cursorPosition);
                const linesBeforeCursor = textBeforeCursor.split('\n');
                const linesAfterCursor = textAfterCursor.split('\n');

                // カーソルのある行を特定
                const currentLineStart = linesBeforeCursor.slice(0, -1).join('\n').length;
                const currentLineEnd = currentLineStart + linesBeforeCursor[linesBeforeCursor.length - 1].length + (linesAfterCursor.length > 0 ? linesAfterCursor[0].length + 1 : 0);

                // 現在行を削除
                const newText = textarea.value.substring(0, currentLineStart) + textarea.value.substring(currentLineEnd);

                textarea.value = newText;
                textarea.selectionStart = textarea.selectionEnd = currentLineStart;
                textarea.style.height = 'auto';
                textarea.style.height = (textarea.scrollHeight) + 'px';
                localStorage.setItem('textContent', textarea.value);
                event.preventDefault();
            }

            // Shiftキーが押された場合
            if (event.key === 'Shift') {
                shiftPressCount++;
                clearTimeout(shiftPressTimer);
                shiftPressTimer = setTimeout(() => {
                    shiftPressCount = 0;
                }, 500);

                if (shiftPressCount === 2) {
                    addToGoogleCalendar();
                    shiftPressCount = 0;
                }
            }

            // Commandキーが押された場合
            if (event.metaKey) {
                commandPressCount++;
                clearTimeout(commandPressTimer);
                commandPressTimer = setTimeout(() => {
                    commandPressCount = 0;
                }, 500);

                if (commandPressCount === 2) {
                    sendToLeChat();
                    commandPressCount = 0;
                }
            }
        });

        // Googleカレンダーに追加
        function addToGoogleCalendar() {
            const cursorPosition = textarea.selectionStart;
            const textBeforeCursor = textarea.value.substring(0, cursorPosition);
            const currentLine = textBeforeCursor.split('\n').pop() || '';

            if (!currentLine.trim()) return;

            const now = new Date();
            const startTime = formatDateForGoogleCalendar(now);
            const endTime = formatDateForGoogleCalendar(new Date(now.getTime() + 60000));

            const calendarUrl = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(currentLine)}&dates=${startTime}/${endTime}`;
            window.open(calendarUrl, '_blank');
        }

        // Le Chatに送信
        function sendToLeChat() {
            const cursorPosition = textarea.selectionStart;
            const textBeforeCursor = textarea.value.substring(0, cursorPosition);
            const currentLine = textBeforeCursor.split('\n').pop() || '';

            if (!currentLine.trim()) return;

            const leChatUrl = `https://chat.mistral.ai/chat?q=${encodeURIComponent(currentLine)}`;
            window.open(leChatUrl, '_blank');
        }

        // Google Calendar 用の日時フォーマットに変換
        function formatDateForGoogleCalendar(date) {
            const pad = (num) => num.toString().padStart(2, '0');
            const year = date.getFullYear();
            const month = pad(date.getMonth() + 1);
            const day = pad(date.getDate());
            const hours = pad(date.getHours());
            const minutes = pad(date.getMinutes());
            const seconds = pad(date.getSeconds());
            return `${year}${month}${day}T${hours}${minutes}${seconds}`;
        }

        // aタグにホバーで location.href による遷移を追加
        document.querySelectorAll('.link-menu a').forEach(link => {
            link.addEventListener('mouseenter', function(e) {
                e.preventDefault();
                location.href = this.href;
            });
        });
    </script>
</body>
</html>
