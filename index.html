<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>テキストボックス</title>
    <link rel="icon" id="favicon" href="" />
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --datetime-color: rgba(0, 0, 255, 0.5);
            --menu-bg-color: rgba(255, 255, 255, 0.8);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1a1a1a;
                --text-color: #e0e0e0;
                --datetime-color: rgba(100, 200, 255, 0.7);
                --menu-bg-color: rgba(40, 40, 40, 0.8);
            }
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            position: relative;
            color: var(--text-color);
        }

        textarea {
            width: 80%;
            max-width: 600px;
            min-height: 200px;
            padding: 12px;
            font-size: 16pt;
            border: none;
            outline: none;
            resize: none;
            box-sizing: border-box;
            font-family: inherit;
            line-height: 1.5;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        textarea::-webkit-resizer {
            display: none;
        }

        #datetime {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: var(--datetime-color);
            font-size: 18px;
            text-align: right;
            line-height: 1.4;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .link-menu {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: var(--menu-bg-color);
            border-radius: 8px;
            padding: 8px 0;
            opacity: 0.6;
            transition: opacity 0.2s, visibility 0.2s;
            z-index: 1000;
            min-width: 200px;
            backdrop-filter: blur(10px);
        }

        .link-menu:hover {
            opacity: 1;
            visibility: visible;
        }

        .link-menu a {
            display: block;
            padding: 8px 16px;
            text-decoration: none;
            transition: background-color 0.2s;
            color: inherit;
        }

        .link-menu a:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .link-amazon { color: #f0c36d; }
        .link-calendar { color: #d4c4a8; }
        .link-mail { color: #8ab4f8; }
        .link-inoreader { color: #88d8b0; }
        .link-lechat { color: #ff8a80; }
        .link-maps { color: #81c995; }
        .link-keep { color: #f4b400; }
        .link-transit { color: #d7ccc8; }
        .link-photos { color: #fbbc04; }
        .link-github { color: #e0e0e0; }
        .link-gemini { color: #bb86fc; }

        @media (max-width: 768px) {
            .link-menu {
                display: none;
            }
        }
    </style>
</head>

<body>
    <textarea id="textContent" autofocus></textarea>
    <div id="datetime"></div>

    <div class="link-menu">
        <a href="https://www.amazon.co.jp/" class="link-amazon" target="_blank">Amazon</a>
        <a href="https://calendar.google.com/calendar/u/0/r" class="link-calendar" target="_blank">Calendar</a>
        <a href="https://mail.zoho.jp/zm/#mail/folder/inbox" class="link-mail" target="_blank">Mail</a>
        <a href="https://www.inoreader.com/all_articles" class="link-inoreader" target="_blank">Inoreader</a>
        <a href="https://chat.mistral.ai/chat" class="link-lechat" target="_blank">Le Chat</a>
        <a href="https://gemini.google.com/" class="link-gemini" target="_blank">Gemini</a>
        <a href="https://www.google.com/maps" class="link-maps" target="_blank">Maps</a>
        <a href="https://keep.google.com/" class="link-keep" target="_blank">Keep</a>
        <a href="https://photos.google.com/?pli=1" class="link-photos" target="_blank">Photos</a>
        <a href="https://transit.yahoo.co.jp/" class="link-transit" target="_blank">乗り換え</a>
        <a href="https://github.com/gojiroma/noonline/edit/main/index.html" class="link-github" target="_blank">Edit</a>
    </div>

    <script>
        const textarea = document.getElementById('textContent');
        const datetimeElement = document.getElementById('datetime');
        const faviconLink = document.getElementById('favicon');

        // ローカルストレージから読み込み
        textarea.value = localStorage.getItem('textContent') || '';

        // テキストエリアの高さを自動調整
        textarea.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            localStorage.setItem('textContent', this.value);
        });
        textarea.style.height = 'auto';
        textarea.style.height = (textarea.scrollHeight) + 'px';

        // ランダムな絵文字を選択
        const emojis = ['🏃', '🎌', '🐱', '📖', '☕', '🌸', '🌙', '🎵', '🚀', '🌈', '🍵', '🎨', '📝', '🌿', '🐢', '🏮', '🎭', '🍡', '🎋', '🏯'];
        const randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];

        // faviconをランダムな絵文字に設定
        faviconLink.href = `data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">${randomEmoji}</text></svg>`;

        // 1日1回のリダイレクト処理
        function checkAndRedirect() {
            const today = new Date().toLocaleDateString('ja-JP');
            const lastRedirectDate = localStorage.getItem('lastRedirectDate');

            if (lastRedirectDate !== today) {
                localStorage.setItem('lastRedirectDate', today);
                window.location.href = 'https://taiso.poet.blue';
            }
        }

        // 日付と時刻を更新
        function updateDatetime() {
            const now = new Date();
            const optionsTime = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            const time = now.toLocaleTimeString('ja-JP', optionsTime);

            const month = now.getMonth() + 1;
            const day = now.getDate();
            const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
            const dayOfWeek = weekdays[now.getDay()];

            document.title = `${time} ${month}/${day} (${dayOfWeek})`;

            const optionsDate = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            const date = now.toLocaleDateString('ja-JP', optionsDate);
            datetimeElement.innerHTML = `${date}<br>${time}`;
        }

        // 初回表示
        updateDatetime();
        setInterval(updateDatetime, 1000);

        // リダイレクトチェックを実行
        checkAndRedirect();

        // Shiftキーを2回押したかを追跡
        let shiftPressCount = 0;
        let shiftPressTimer = null;

        // Commandキーを2回押したかを追跡
        let commandPressCount = 0;
        let commandPressTimer = null;

        // キーイベントを監視
        document.addEventListener('keydown', function (event) {
            if (event.key === 'Escape') {
                const cursorPosition = textarea.selectionStart;
                const textBeforeCursor = textarea.value.substring(0, cursorPosition);
                const textAfterCursor = textarea.value.substring(cursorPosition);
                const linesBeforeCursor = textBeforeCursor.split('\n');
                const linesAfterCursor = textAfterCursor.split('\n');

                const currentLineStart = linesBeforeCursor.slice(0, -1).join('\n').length;
                const currentLineEnd = currentLineStart + linesBeforeCursor[linesBeforeCursor.length - 1].length + (linesAfterCursor.length > 0 ? linesAfterCursor[0].length + 1 : 0);

                const newText = textarea.value.substring(0, currentLineStart) + textarea.value.substring(currentLineEnd);
                textarea.value = newText;
                textarea.selectionStart = textarea.selectionEnd = currentLineStart;
                textarea.style.height = 'auto';
                textarea.style.height = (textarea.scrollHeight) + 'px';
                localStorage.setItem('textContent', textarea.value);
                event.preventDefault();
            }

            if (event.key === 'Shift') {
                shiftPressCount++;
                clearTimeout(shiftPressTimer);
                shiftPressTimer = setTimeout(() => {
                    shiftPressCount = 0;
                }, 500);

                if (shiftPressCount === 2) {
                    addToGoogleCalendar();
                    shiftPressCount = 0;
                }
            }

            if (event.metaKey) {
                commandPressCount++;
                clearTimeout(commandPressTimer);
                commandPressTimer = setTimeout(() => {
                    commandPressCount = 0;
                }, 500);

                if (commandPressCount === 2) {
                    sendToLeChat();
                    commandPressCount = 0;
                }
            }
        });

        function addToGoogleCalendar() {
            const cursorPosition = textarea.selectionStart;
            const textBeforeCursor = textarea.value.substring(0, cursorPosition);
            const currentLine = textBeforeCursor.split('\n').pop() || '';
            if (!currentLine.trim()) return;

            const now = new Date();
            const startTime = formatDateForGoogleCalendar(now);
            const endTime = formatDateForGoogleCalendar(new Date(now.getTime() + 60000));
            const calendarUrl = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(currentLine)}&dates=${startTime}/${endTime}`;
            window.open(calendarUrl, '_blank');
        }

        function sendToLeChat() {
            const cursorPosition = textarea.selectionStart;
            const textBeforeCursor = textarea.value.substring(0, cursorPosition);
            const currentLine = textBeforeCursor.split('\n').pop() || '';
            if (!currentLine.trim()) return;

            const leChatUrl = `https://chat.mistral.ai/chat?q=${encodeURIComponent(currentLine)}`;
            window.open(leChatUrl, '_blank');
        }

        function formatDateForGoogleCalendar(date) {
            const pad = (num) => num.toString().padStart(2, '0');
            const year = date.getFullYear();
            const month = pad(date.getMonth() + 1);
            const day = pad(date.getDate());
            const hours = pad(date.getHours());
            const minutes = pad(date.getMinutes());
            const seconds = pad(date.getSeconds());
            return `${year}${month}${day}T${hours}${minutes}${seconds}`;
        }

        document.querySelectorAll('.link-menu a').forEach(link => {
            link.addEventListener('mouseenter', function (e) {
                e.preventDefault();
                location.href = this.href;
            });
        });
    </script>
</body>
</html>
